  - name: system
    environment:
        jwt_issuer : ${jwt_issuer}
        root_account : ${root_account}
        token_secret_key : ${token_secret_key}
        token_root_secret_key : ${token_root_secret_key}
        database_url : ${database_url}
        SPACES_KEY: ${SPACES_KEY}
        SPACES_SECRET: ${SPACES_SECRET}
        SPACES_ENDPOINT: "${SPACES_ENDPOINT}"
        SPACES_NAME: "${SPACES_NAME}"
        VALID_API_URL: "${VALID_API_URL}"
    functions:
      - name: file
        runtime: nodejs:14
        web: true  
        limits:
          timeout: 3000
          memory: 512
      - name: init
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: zombie
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: project
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: member
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: space
        runtime: nodejs:14
        web: true  
        limits:
          timeout: 3000
          memory: 512
