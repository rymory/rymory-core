packages:
  - name: security
    environment:
        jwt_issuer : ${jwt_issuer}
        root_account : ${root_account}
        token_secret_key : ${token_secret_key}
        token_root_secret_key : ${token_root_secret_key}
        database_url : ${database_url}
        ticket_secret_key : ${ticket_secret_key}
    functions:
      - name: authenticate
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: account
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: role
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: validation
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
      - name: ticket
        runtime: go:1.20
        web: true  
        limits:
          timeout: 3000
          memory: 128
